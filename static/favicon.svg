<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="110" ry="110" fill="#1a1a2e"/>

  <!-- Resin drop icon centered -->
  <g transform="translate(256, 256)">
    <!-- Main drop shape with lighter orange -->
    <ellipse cx="0" cy="-20" rx="65" ry="75" fill="#FF9F43"/>

    <!-- Secondary drop shape -->
    <ellipse cx="45" cy="20" rx="55" ry="65" fill="#FF7A3D"/>

    <!-- Highlight -->
    <ellipse cx="-30" cy="-40" rx="28" ry="35" fill="#FFD166" opacity="0.6"/>

    <!-- Dark accent -->
    <ellipse cx="50" cy="50" rx="30" ry="40" fill="#E85D3F"/>
  </g>
</svg>
